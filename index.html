<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Launchpad | Vault & Invoice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        /* Invoice Specific Styles */
        .paper-folio {
            width: 8.5in; height: 13in; 
            background: white; padding: 0.6in;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin: 0 auto; display: flex; flex-direction: column; color: black;
        }
        .preview-pane {
            background-color: #333; display: flex; justify-content: center;
            align-items: flex-start; padding: 40px 20px; overflow: auto; flex: 1;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .masked-text { -webkit-text-security: disc; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATA DEFS ---
        const BRANDS = {
            "Ray-Ban": {
                logo: "https://i.imgur.com/3oiJU4B.png",
                contact: "We’re available Monday-Friday 8:30AM to 8:00PM EST and Saturday 9PM to 7PM EST by email at CustomerCare@Ray-Ban.com or via chat.",
                sig: ["Ray-Ban Customer Care", "customercare@ray-ban.com", "www.ray-ban.com"],
                footer: ["Ray-Ban.com", "4000 Luxottica place", "Mason, OH 45040"]
            },
            "Ray-Ban CA": {
                logo: "https://i.imgur.com/3oiJU4B.png",
                contact: "We’re available Monday-Friday 8:30AM to 8:00PM EST and Saturday 9PM to 7PM EST by email at CustomerCare@Ray-Ban.com or via chat.",
                sig: ["Ray-Ban Customer Care", "customercare@ray-ban.com", "www.ray-ban.com", "877-322-1065"],
                footer: ["Ray-Ban.com", "2670 Rue Diab", "Saint-Laurent, QC H4S 1E8", "877-322-1065"]
            },
            "Oakley": {
                logo: "https://i.imgur.com/O0djhGl.png",
                contact: "We are available Monday-Friday 8:30AM to 5:30PM EST and can be reached at (800) 403-7449 or by email at customercare@oakley.com",
                sig: ["Oakley Customer Care", "CustomerCare@Oakley.com", "www.oakley.com", "800-403-7449"],
                footer: ["OAKLEY.com", "4000 Luxottica place", "Mason, OH 45040"]
            },
            "Oakley CA": {
                logo: "https://i.imgur.com/O0djhGl.png",
                contact: "We are available Monday-Friday 8:30AM to 5:30PM EST and can be reached at (800) 403-7449 or by email at customercare@oakley.com",
                sig: ["Oakley Customer Care", "CustomerCare@Oakley.com", "www.oakley.com", "800-403-7449"],
                footer: ["Oakley Canada Inc.", "2670 Rue Diab", "Saint-Laurent, QC H4S 1E8", "877-322-1065"]
            }
        };

        const VAULT_DATA = [
            { brand: "CyberSource - Oakley SI CA", org: "oakleysi_ca", user: "BBarliso-oakleysi_ca", pass: "zzZZaaAAqqQQ11!!", hist: [] },
            { brand: "CyberSource - Oakley SI", org: "oakleysi", user: "BBarliso-oakleysi", pass: "zzZZaaAAqqQQ11!!", hist: [] },
            { brand: "CyberSource - Oakley US", org: "oakleydigital_us", user: "BBarliso-oakleydigital_us", pass: "zzZZaaAAqqQQ22@@", hist: ["zzZZaaAAqqQQ11!!"] },
            { brand: "CyberSource - Rayban US", org: "rayban_cs_us", user: "BBarliso-rayban_cs_us", pass: "zzZZaaAAqqQQ22@@", hist: ["zzZZaaAAqqQQ11!!"] },
            { brand: "PayPal - Other Brands", org: "backofficelux", user: "backofficelux", pass: "Costa@712020", hist: [] },
            { brand: "SAP", org: "System", user: "C22992", pass: "zzXXaaSSqqWW11@@!", hist: [] },
            { brand: "Business Track (Gift Card)", org: "Portal", user: "cl.benbar380", pass: "zzZZaaAAqqQQ11!!", hist: [] }
            // ... Add more cards here if needed
        ];

        // --- COMPONENTS ---

        const CredentialVault = () => {
            const [search, setSearch] = useState("");
            const [toast, setToast] = useState(false);

            const copy = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setToast(true);
                setTimeout(() => setToast(false), 1500);
            };

            const filtered = VAULT_DATA.filter(item => 
                item.brand.toLowerCase().includes(search.toLowerCase()) || 
                item.user.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="p-6 h-full overflow-y-auto">
                    <div className="max-w-6xl mx-auto">
                        <input 
                            className="w-full p-4 rounded-xl border-2 border-slate-200 mb-8 sticky top-0 bg-white shadow-sm outline-none focus:border-blue-500"
                            placeholder="Search credentials..." 
                            onChange={(e) => setSearch(e.target.value)}
                        />
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filtered.map((item, i) => (
                                <div key={i} className="bg-white p-5 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition">
                                    <div className="text-blue-600 font-bold text-lg">{item.brand}</div>
                                    <div className="text-[10px] text-slate-400 font-bold uppercase mb-4">{item.org}</div>
                                    <div className="space-y-3">
                                        <div>
                                            <label className="text-[10px] text-slate-400 font-bold uppercase">Username</label>
                                            <div onClick={() => copy(item.user)} className="bg-slate-50 p-2 rounded text-sm font-mono cursor-pointer hover:bg-slate-100 truncate">
                                                {item.user}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] text-slate-400 font-bold uppercase">Password</label>
                                            <div onClick={() => copy(item.pass)} className="bg-slate-50 p-2 rounded text-sm font-mono cursor-pointer hover:bg-slate-100 masked-text">
                                                {item.pass}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-2 rounded-full shadow-2xl text-sm z-50">Copied!</div>}
                </div>
            );
        };

        const InvoiceCreator = () => {
            const [formData, setFormData] = useState({
                brand: "Oakley", orderNumber: "", customerName: "", patientName: "",
                orderDate: "", paymentDate: "", paymentMethod: "Visa", ccDigits: "",
                framePrice: "", lensesPrice: "", insuranceApplied: "No", protectionPlan: "No",
                protectionPlanPrice: "", subtotal: "", promotion: "", discount: "",
                tax: "", shipping: "", total: "", frameModel: "", frameColor: "",
                lensUse: "Single Vision", lensThickness: "", lensTreatments: "",
                lensColor: "", address: ""
            });
            const [zoom, setZoom] = useState(0.55);

            const handleInput = (e) => {
                const { name, value } = e.target;
                const capitalized = value.replace(/\b\w/g, l => l.toUpperCase());
                setFormData(prev => ({ ...prev, [name]: capitalized }));
            };

            const formatPrice = (val) => {
                if (!val || val.trim() === "" || val === "$") return "$0.00";
                let num = parseFloat(val.replace(/[$,]/g, ""));
                return isNaN(num) ? "$0.00" : "$" + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            const downloadPDF = () => {
                const element = document.getElementById('invoice-doc');
                const opt = {
                    margin: 0, filename: `${formData.customerName}_Invoice.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'in', format: [8.5, 13], orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            };

            const activeBrand = BRANDS[formData.brand];
            const estDate = new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York', year: 'numeric', month: 'long', day: 'numeric' });

            return (
                <div className="flex h-full w-full">
                    {/* Left Preview */}
                    <div className="w-3/5 flex flex-col h-full border-r border-slate-300">
                        <div className="bg-slate-800 p-2 flex justify-center items-center gap-6 text-white text-[10px]">
                            <button onClick={() => setZoom(z => z - 0.05)} className="bg-slate-600 px-2 rounded">-</button>
                            <span className="uppercase tracking-widest font-bold">PDF Preview</span>
                            <button onClick={() => setZoom(z => z + 0.05)} className="bg-slate-600 px-2 rounded">+</button>
                        </div>
                        <div className="preview-pane no-scrollbar">
                            <div style={{ transform: `scale(${zoom})`, transformOrigin: 'top center' }}>
                                <div id="invoice-doc" className="paper-folio">
                                    <div className="flex flex-col items-end mb-10">
                                        <img src={activeBrand.logo} className="h-14 mb-2 object-contain" crossOrigin="anonymous" />
                                        <p className="text-sm">{estDate}</p>
                                    </div>
                                    <div className="text-[11pt] leading-relaxed mb-8 flex-grow">
                                        <p className="mb-4">To Whom It May Concern,</p>
                                        <p className="mb-4">I’m writing in regards to the prescription glasses ordered by <strong className="font-bold">{formData.customerName || "[Customer Name]"}</strong>...</p>
                                        <p className="mb-6">{activeBrand.contact}</p>
                                        <p>Best Regards,</p>
                                        <div className="mt-1">{activeBrand.sig.map((line, i) => <p key={i}>{line}</p>)}</div>
                                        
                                        <div className="mt-10">
                                            <div className="flex justify-between border-b-2 border-black pb-1"><span className="font-bold uppercase text-xs">Order Summary</span></div>
                                            <table className="w-full text-xs mt-2">
                                                <tr className="border-b"><td className="py-1">Frame: {formData.frameModel} ({formData.frameColor})</td><td className="text-right">{formatPrice(formData.framePrice)}</td></tr>
                                                <tr className="border-b"><td className="py-1">Lenses: {formData.lensUse} ({formData.lensColor})</td><td className="text-right">{formatPrice(formData.lensesPrice)}</td></tr>
                                                {formData.protectionPlan === "Yes" && <tr className="border-b"><td className="py-1">Protection Plan</td><td className="text-right">{formatPrice(formData.protectionPlanPrice)}</td></tr>}
                                            </table>
                                            <div className="flex justify-end mt-4"><div className="w-40 space-y-1">
                                                <div className="flex justify-between text-[10pt]"><span>Total Paid:</span><span className="font-bold">{formatPrice(formData.total)}</span></div>
                                            </div></div>
                                        </div>
                                    </div>
                                    <div className="mt-auto text-center text-slate-400 text-[8pt]">{activeBrand.footer.join(' | ')}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    {/* Right Form */}
                    <div className="w-2/5 h-full overflow-y-auto p-6 bg-white">
                        <div className="space-y-4">
                            <select name="brand" value={formData.brand} onChange={handleInput} className="w-full border p-2 rounded font-bold text-blue-600">{Object.keys(BRANDS).map(b => <option key={b}>{b}</option>)}</select>
                            <input name="customerName" placeholder="Customer Name" onChange={handleInput} value={formData.customerName} className="w-full border p-2 rounded" />
                            <input name="orderNumber" placeholder="Order #" onChange={handleInput} value={formData.orderNumber} className="w-full border p-2 rounded" />
                            <div className="grid grid-cols-2 gap-2">
                                <input name="framePrice" placeholder="Frame $" onChange={handleInput} value={formData.framePrice} className="border p-2 rounded" />
                                <input name="lensesPrice" placeholder="Lens $" onChange={handleInput} value={formData.lensesPrice} className="border p-2 rounded" />
                                <input name="total" placeholder="Final Total" onChange={handleInput} value={formData.total} className="border p-2 rounded bg-yellow-50 font-bold" />
                                <button onClick={downloadPDF} className="bg-blue-600 text-white font-bold rounded">Download</button>
                            </div>
                            <textarea name="address" placeholder="Address" onChange={handleInput} value={formData.address} className="w-full border p-2 rounded h-20 text-sm" />
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [tab, setTab] = useState("vault");

            return (
                <div className="flex flex-col h-screen">
                    <nav className="bg-slate-900 text-white flex px-6 shadow-xl z-20">
                        <div className="py-4 font-bold text-lg mr-10 tracking-tighter">BEN'S HUB</div>
                        <button onClick={() => setTab("vault")} className={`px-6 py-4 text-xs font-bold uppercase tracking-widest transition ${tab === 'vault' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>Credential Vault</button>
                        <button onClick={() => setTab("invoice")} className={`px-6 py-4 text-xs font-bold uppercase tracking-widest transition ${tab === 'invoice' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>Invoice Creator</button>
                    </nav>
                    <main className="flex-grow overflow-hidden">
                        {tab === 'vault' ? <CredentialVault /> : <InvoiceCreator />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
