<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Creator - 8.5x13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Helvetica:wght@400;700&display=swap');
        body { font-family: 'Helvetica', Arial, sans-serif; }
        .paper-folio {
            width: 8.5in; height: 13in; 
            background: white; padding: 0.6in;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin: 0 auto; display: flex; flex-direction: column; color: black;
        }
        .preview-pane {
            background-color: #333; display: flex; justify-content: center;
            align-items: flex-start; padding: 40px 20px; overflow: auto; flex: 1;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        table { border-collapse: collapse; width: 100%; }
        th, td { padding: 4px 0; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState } = React;

        const BRANDS = {
            "Ray-Ban": {
                logo: "https://i.imgur.com/3oiJU4B.png",
                contact: "We’re available Monday-Friday 8:30AM to 8:00PM EST and Saturday 9PM to 7PM EST by email at CustomerCare@Ray-Ban.com or via chat.",
                sig: ["Ray-Ban Customer Care", "customercare@ray-ban.com", "www.ray-ban.com"],
                footer: ["Ray-Ban.com", "4000 Luxottica place", "Mason, OH 45040"]
            },
            "Ray-Ban CA": {
                logo: "https://i.imgur.com/3oiJU4B.png",
                contact: "We’re available Monday-Friday 8:30AM to 8:00PM EST and Saturday 9PM to 7PM EST by email at CustomerCare@Ray-Ban.com or via chat.",
                sig: ["Ray-Ban Customer Care", "customercare@ray-ban.com", "www.ray-ban.com", "877-322-1065"],
                footer: ["Ray-Ban.com", "2670 Rue Diab", "Saint-Laurent, QC H4S 1E8", "877-322-1065"]
            },
            "Oakley": {
                logo: "https://i.imgur.com/O0djhGl.png",
                contact: "We are available Monday-Friday 8:30AM to 5:30PM EST and can be reached at (800) 403-7449 or by email at customercare@oakley.com",
                sig: ["Oakley Customer Care", "CustomerCare@Oakley.com", "www.oakley.com", "800-403-7449"],
                footer: ["OAKLEY.com", "4000 Luxottica place", "Mason, OH 45040"]
            },
            "Oakley CA": {
                logo: "https://i.imgur.com/O0djhGl.png",
                contact: "We are available Monday-Friday 8:30AM to 5:30PM EST and can be reached at (800) 403-7449 or by email at customercare@oakley.com",
                sig: ["Oakley Customer Care", "CustomerCare@Oakley.com", "www.oakley.com", "800-403-7449"],
                footer: ["Oakley Canada Inc.", "2670 Rue Diab", "Saint-Laurent, QC H4S 1E8", "877-322-1065"]
            }
        };

        const INITIAL_STATE = {
            brand: "Oakley",
            orderNumber: "",
            customerName: "",
            patientName: "",
            orderDate: "",
            paymentDate: "",
            paymentMethod: "Visa",
            ccDigits: "",
            framePrice: "",
            lensesPrice: "",
            insuranceApplied: "No",
            protectionPlan: "No",
            protectionPlanPrice: "",
            subtotal: "",
            promotion: "",
            discount: "",
            tax: "",
            shipping: "",
            total: "",
            frameModel: "",
            frameColor: "",
            lensUse: "Single Vision",
            lensThickness: "",
            lensTreatments: "",
            lensColor: "",
            address: ""
        };

        const App = () => {
            const [formData, setFormData] = useState(INITIAL_STATE);
            const [zoom, setZoom] = useState(0.55);

            const handleInput = (e) => {
                const { name, value } = e.target;
                const capitalized = value.replace(/\b\w/g, l => l.toUpperCase());
                setFormData(prev => ({ ...prev, [name]: capitalized }));
            };

            // Formatting logic: Ensures $ sign and .00 decimal precision
            const formatPrice = (val) => {
                if (!val || val.trim() === "" || val === "$") return "$0.00";
                
                // Remove existing $ and commas to parse the number
                let cleanValue = val.replace(/[$,]/g, "");
                let num = parseFloat(cleanValue);
                
                if (isNaN(num)) return "$0.00";
                
                return "$" + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            const resetForm = () => { if(confirm("Clear all data?")) setFormData(INITIAL_STATE); };

            const downloadPDF = () => {
                const element = document.getElementById('invoice-doc');
                const nameParts = formData.customerName.trim().split(' ');
                const lastName = nameParts.length > 0 ? nameParts[nameParts.length - 1] : "Customer";
                const opt = {
                    margin: 0,
                    filename: `${lastName}_Invoice.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'in', format: [8.5, 13], orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            };

            const activeBrand = BRANDS[formData.brand];
            const estDate = new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York', year: 'numeric', month: 'long', day: 'numeric' });

            return (
                <div className="flex h-screen w-full">
                    {/* PREVIEW ON THE LEFT */}
                    <div className="w-3/5 flex flex-col h-full border-r border-black shadow-inner">
                        <div className="bg-black p-2 flex justify-center items-center gap-6 text-white text-xs">
                            <button onClick={() => setZoom(z => z - 0.05)} className="bg-gray-700 px-3 py-1 rounded">-</button>
                            <span className="font-bold tracking-widest uppercase">Invoice Preview</span>
                            <button onClick={() => setZoom(z => z + 0.05)} className="bg-gray-700 px-3 py-1 rounded">+</button>
                        </div>
                        <div className="preview-pane no-scrollbar">
                            <div style={{ transform: `scale(${zoom})`, transformOrigin: 'top center' }}>
                                <div id="invoice-doc" className="paper-folio">
                                    <div className="flex flex-col items-end mb-10">
                                        <img src={activeBrand.logo} className="h-14 mb-2 object-contain" crossOrigin="anonymous" />
                                        <p className="text-sm">{estDate}</p>
                                    </div>

                                    <div className="text-[11pt] leading-relaxed mb-8">
                                        <p className="mb-4">To Whom It May Concern,</p>
                                        <p className="mb-4">
                                            I’m writing in regards to the prescription glasses ordered by <strong className="font-bold">{formData.customerName || "[Customer Name]"}</strong>. 
                                            I have broken down the information on the most recent order by price for insurance purposes. 
                                            If you have any further questions or concerns, we would love to help you at any time.
                                        </p>
                                        <p className="mb-6">{activeBrand.contact}</p>
                                        <p>Best Regards,</p>
                                        <div className="mt-1">
                                            {activeBrand.sig.map((line, i) => <p key={i}>{line}</p>)}
                                        </div>
                                    </div>

                                    <div className="flex-grow">
                                        <div className="flex justify-between items-end mb-1">
                                            <p className="text-xs font-bold">Order Number: {formData.orderNumber}</p>
                                            <p className="text-xs font-bold text-right">Order Date: {formData.orderDate}</p>
                                        </div>
                                        <h2 className="text-lg font-bold border-b-2 border-black mb-4 uppercase">Order Summary</h2>
                                        
                                        <table className="text-[10pt]">
                                            <thead className="border-b border-gray-300">
                                                <tr className="text-left font-bold uppercase text-gray-600">
                                                    <th className="w-1/2">Description</th>
                                                    <th className="text-center w-12">Units</th>
                                                    <th className="text-right">Cost Per Unit</th>
                                                    <th className="text-right">Amount</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                <tr><td className="font-bold pt-4" colSpan="4">Frame</td></tr>
                                                <tr><td className="pl-4">Model: {formData.frameModel}</td></tr>
                                                <tr><td className="pl-4">Color: {formData.frameColor}</td><td className="text-center">1</td><td className="text-right">{formatPrice(formData.framePrice)}</td><td className="text-right">{formatPrice(formData.framePrice)}</td></tr>
                                                
                                                <tr><td className="font-bold pt-4" colSpan="4">Lenses</td></tr>
                                                <tr><td className="pl-4">Color: {formData.lensColor}</td><td rowSpan="2" className="text-center align-top pt-1">1</td><td rowSpan="2" className="text-right align-top pt-1">{formatPrice(formData.lensesPrice)}</td><td rowSpan="2" className="text-right align-top pt-1">{formatPrice(formData.lensesPrice)}</td></tr>
                                                <tr><td className="pl-4">Use: {formData.lensUse}</td></tr>
                                                <tr><td className="pl-4">Thickness: {formData.lensThickness}</td></tr>
                                                <tr><td className="pl-4 pb-4">Treatments: {formData.lensTreatments}</td></tr>

                                                {formData.protectionPlan === "Yes" && (
                                                    <tr>
                                                        <td className="font-bold pt-4 uppercase">Protection Plan</td>
                                                        <td className="text-center pt-4">1</td>
                                                        <td className="text-right pt-4">{formatPrice(formData.protectionPlanPrice)}</td>
                                                        <td className="text-right pt-4">{formatPrice(formData.protectionPlanPrice)}</td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>

                                        <div className="mt-12 flex justify-between gap-10 text-[10pt]">
                                            <div className="w-1/2 space-y-4">
                                                <p className="font-bold leading-snug">
                                                    Customer paid in full on {formData.paymentDate} with {formData.paymentMethod} {formData.ccDigits ? `ending in ${formData.ccDigits}` : ""}
                                                </p>
                                                <div className="space-y-1">
                                                    <p>• <strong>Patient Name:</strong> {formData.patientName || formData.customerName}</p>
                                                    <p>• <strong>Insurance Applied:</strong> {formData.insuranceApplied}</p>
                                                    <p>• <strong>Protection Plan:</strong> {formData.protectionPlan}</p>
                                                    <p>• <strong>Patient Address:</strong> {formData.address}</p>
                                                </div>
                                            </div>
                                            <div className="w-1/3 space-y-1">
                                                <div className="flex justify-between border-b py-1"><span>SUBTOTAL</span><span>{formatPrice(formData.subtotal)}</span></div>
                                                <div className="flex justify-between border-b py-1 text-red-600"><span>PROMOTIONS</span><span>-{formatPrice(formData.promotion)}</span></div>
                                                <div className="flex justify-between border-b py-1 text-red-600"><span>DISCOUNT</span><span>-{formatPrice(formData.discount)}</span></div>
                                                <div className="flex justify-between border-b py-1"><span>TAXES</span><span>{formatPrice(formData.tax)}</span></div>
                                                <div className="flex justify-between border-b py-1"><span>SHIPPING</span><span>{formatPrice(formData.shipping)}</span></div>
                                                <div className="flex justify-between font-bold text-lg pt-2 border-t-2 border-black"><span>TOTAL</span><span>{formatPrice(formData.total)}</span></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-auto text-center text-gray-500 space-y-1" style={{ fontSize: '8pt' }}>
                                        {activeBrand.footer.map((l, i) => <p key={i}>{l}</p>)}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* FORM ON THE RIGHT */}
                    <div className="w-2/5 h-full overflow-y-auto p-6 bg-white flex flex-col">
                        <h2 className="text-xl font-bold mb-6 border-b pb-2">Entry Form</h2>
                        <div className="flex-grow space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] font-bold text-gray-400">BRAND</label>
                                <select name="brand" value={formData.brand} onChange={handleInput} className="w-full border p-2 rounded bg-gray-50">{Object.keys(BRANDS).map(b => <option key={b}>{b}</option>)}</select></div>
                                <div><label className="text-[10px] font-bold text-gray-400">ORDER #</label><input name="orderNumber" onChange={handleInput} value={formData.orderNumber} className="w-full border p-2 rounded" /></div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] font-bold text-gray-400">CUSTOMER NAME</label><input name="customerName" onChange={handleInput} value={formData.customerName} className="w-full border p-2 rounded" /></div>
                                <div><label className="text-[10px] font-bold text-gray-400">PATIENT NAME</label><input name="patientName" onChange={handleInput} value={formData.patientName} className="w-full border p-2 rounded" placeholder="Same as customer" /></div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] font-bold text-gray-400">ORDER DATE</label><input type="date" name="orderDate" onChange={handleInput} value={formData.orderDate} className="w-full border p-2 rounded" /></div>
                                <div><label className="text-[10px] font-bold text-gray-400">PAYMENT DATE</label><input type="date" name="paymentDate" onChange={handleInput} value={formData.paymentDate} className="w-full border p-2 rounded" /></div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] font-bold text-gray-400">PAYMENT METHOD</label>
                                <select name="paymentMethod" onChange={handleInput} value={formData.paymentMethod} className="w-full border p-2 rounded">
                                    {["Affirm", "Afterpay", "American Express", "Apple Pay", "Discover", "MasterCard", "PayPal", "Gift Card", "Visa", "Klarna"].map(m => <option key={m}>{m}</option>)}
                                </select></div>
                                <div><label className="text-[10px] font-bold text-gray-400">LAST 4 CC</label><input name="ccDigits" maxLength="4" onChange={handleInput} value={formData.ccDigits} className="w-full border p-2 rounded" /></div>
                            </div>

                            <div className="bg-gray-50 p-3 rounded-lg space-y-3 border">
                                <p className="text-xs font-bold text-gray-400 border-b pb-1">PRODUCT SPECS</p>
                                <div className="grid grid-cols-2 gap-2">
                                    <input name="frameModel" placeholder="Frame Model #" onChange={handleInput} value={formData.frameModel} className="border p-2 rounded text-sm" />
                                    <input name="framePrice" placeholder="Frame Price" onChange={handleInput} value={formData.framePrice} className="border p-2 rounded text-sm" />
                                    <input name="frameColor" placeholder="Frame Color" onChange={handleInput} value={formData.frameColor} className="border p-2 rounded text-sm" />
                                    <input name="lensColor" placeholder="Lens Color" onChange={handleInput} value={formData.lensColor} className="border p-2 rounded text-sm" />
                                    <select name="lensUse" onChange={handleInput} value={formData.lensUse} className="border p-2 rounded text-sm">
                                        <option>Single Vision</option><option>Progressive</option><option>Non-prescription</option>
                                    </select>
                                    <input name="lensesPrice" placeholder="Lens Price" onChange={handleInput} value={formData.lensesPrice} className="border p-2 rounded text-sm" />
                                    <input name="lensThickness" placeholder="Thickness" onChange={handleInput} value={formData.lensThickness} className="border p-2 rounded text-sm" />
                                    <input name="lensTreatments" placeholder="Treatments" onChange={handleInput} value={formData.lensTreatments} className="border p-2 rounded text-sm" />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] font-bold text-gray-400">INSURANCE APPLIED</label><select name="insuranceApplied" onChange={handleInput} value={formData.insuranceApplied} className="w-full border p-2 rounded"><option>Yes</option><option>No</option></select></div>
                                <div><label className="text-[10px] font-bold text-gray-400">PROTECTION PLAN</label><select name="protectionPlan" onChange={handleInput} value={formData.protectionPlan} className="w-full border p-2 rounded"><option>Yes</option><option>No</option></select></div>
                            </div>

                            <div className="grid grid-cols-3 gap-2 bg-yellow-50 p-2 rounded border border-yellow-200">
                                <input name="protectionPlanPrice" placeholder="Plan Price" onChange={handleInput} value={formData.protectionPlanPrice} className="border p-2 rounded text-xs" />
                                <input name="subtotal" placeholder="Subtotal" onChange={handleInput} value={formData.subtotal} className="border p-2 rounded text-xs" />
                                <input name="promotion" placeholder="Promo (-)" onChange={handleInput} value={formData.promotion} className="border p-2 rounded text-xs" />
                                <input name="discount" placeholder="Disc (-)" onChange={handleInput} value={formData.discount} className="border p-2 rounded text-xs" />
                                <input name="tax" placeholder="Tax" onChange={handleInput} value={formData.tax} className="border p-2 rounded text-xs" />
                                <input name="shipping" placeholder="Ship" onChange={handleInput} value={formData.shipping} className="border p-2 rounded text-xs" />
                                <input name="total" placeholder="TOTAL" onChange={handleInput} value={formData.total} className="border p-2 rounded text-xs font-bold bg-white" />
                            </div>

                            <div><label className="text-[10px] font-bold text-gray-400">CUSTOMER ADDRESS</label><textarea name="address" onChange={handleInput} value={formData.address} className="w-full border p-2 rounded h-20 text-sm" /></div>
                        </div>

                        <div className="flex gap-4 mt-6 border-t pt-4">
                            <button onClick={resetForm} className="flex-1 bg-red-100 text-red-600 font-bold py-3 rounded hover:bg-red-200 transition">RESET</button>
                            <button onClick={downloadPDF} className="flex-1 bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 shadow-lg transition uppercase">Download PDF</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
